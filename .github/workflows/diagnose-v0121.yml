name: Diagnose Pawchive v0.12.1 publication

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0121/pr-trigger2'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Diagnose staged patch
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v0121-diagnostics.txt
          : > "$result"
          echo "HEAD=$(git rev-parse HEAD)" >> "$result"
          echo "userscript_blob=$(git hash-object pawchive-pw-media-filter.user.js)" >> "$result"
          grep -m1 '@version' pawchive-pw-media-filter.user.js >> "$result" 2>&1
          git fetch origin master "$GITHUB_HEAD_REF" >> "$result" 2>&1
          python - "$GITHUB_HEAD_REF" >> "$result" 2>&1 <<'PY'
          import base64, gzip, hashlib, pathlib, subprocess, sys
          branch = sys.argv[1]
          parts=[]
          for suffix in ('00','01','02','03'):
              content=subprocess.check_output(['git','show',f'origin/{branch}:.pawchive-v0121/part{suffix}'])
              parts.append(content)
              print(f'part{suffix}_len={len(content)} sha256={hashlib.sha256(content).hexdigest()}')
          encoded=b''.join(parts)
          print(f'base64_len={len(encoded)} sha256={hashlib.sha256(encoded).hexdigest()}')
          pathlib.Path('/tmp/pawchive-v0121.patch.gz.b64').write_bytes(encoded)
          try:
              compressed=base64.b64decode(encoded, validate=True)
              print(f'gzip_len={len(compressed)} sha256={hashlib.sha256(compressed).hexdigest()}')
              pathlib.Path('/tmp/pawchive-v0121.patch.gz').write_bytes(compressed)
              patch=gzip.decompress(compressed)
              print(f'patch_len={len(patch)} sha256={hashlib.sha256(patch).hexdigest()}')
              pathlib.Path('/tmp/pawchive-v0121.patch').write_bytes(patch)
          except Exception as exc:
              print(f'decode_error={exc!r}')
              raise
          PY
          echo '--- git apply --check ---' >> "$result"
          git apply --check /tmp/pawchive-v0121.patch >> "$result" 2>&1
          echo "apply_check_exit=$?" >> "$result"
          echo '--- patch paths ---' >> "$result"
          grep '^+++ b/' /tmp/pawchive-v0121.patch | head -100 >> "$result" 2>&1
          cat "$result"

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v0121-diagnostics
          path: /tmp/pawchive-v0121-diagnostics.txt
          if-no-files-found: error
