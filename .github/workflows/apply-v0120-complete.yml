name: Apply complete Pawchive v0.12.0

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0120/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0120-complete-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.12.0 tree
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "c6a808fd6accffcaa54f243f34b3035999feb5b4"
          grep -q '@version      0.11.6' pawchive-pw-media-filter.user.js
          : > /tmp/pawchive-v0120-files.tar.gz.b64
          for part in $(seq -w 0 19); do
            git show "origin/$GITHUB_HEAD_REF:.pawchive-v0120/part${part}" >> /tmp/pawchive-v0120-files.tar.gz.b64
          done
          test "$(wc -c < /tmp/pawchive-v0120-files.tar.gz.b64 | tr -d ' ')" = "392024"
          test "$(sha256sum /tmp/pawchive-v0120-files.tar.gz.b64 | awk '{print $1}')" = "fc9ff43a33f2813cb1058e7f13a00f26701ee107062e9c89489d5f9fdc4ba501"
          base64 -d /tmp/pawchive-v0120-files.tar.gz.b64 > /tmp/pawchive-v0120-files.tar.gz
          test "$(sha256sum /tmp/pawchive-v0120-files.tar.gz | awk '{print $1}')" = "1ddedafbb9ad2524bbef9ea2670f21d00779804feea6c41901a7bb9c201f7480"
          test "$(tar -tzf /tmp/pawchive-v0120-files.tar.gz | wc -l | tr -d ' ')" = "41"
          tar -xzf /tmp/pawchive-v0120-files.tar.gz -C .

      - name: Validate v0.12.0
        id: validate
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v0120-validation.txt
          : > "$result"
          failed=0
          echo "Node: $(node --version)" >> "$result"
          if node --check pawchive-pw-media-filter.user.js >> "$result" 2>&1; then
            echo "PASS node --check" >> "$result"
          else
            echo "FAIL node --check" >> "$result"
            failed=1
          fi
          test_count=0
          while IFS= read -r test_file; do
            test_count=$((test_count + 1))
            one=/tmp/pawchive-one-test.log
            if node "$test_file" > "$one" 2>&1; then
              echo "PASS $test_file" >> "$result"
            else
              echo "FAIL $test_file" >> "$result"
              cat "$one" >> "$result"
              failed=1
            fi
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count" >> "$result"
          if [ "$test_count" -ne 56 ]; then
            echo "FAIL expected 56 executable tests" >> "$result"
            failed=1
          fi
          if git diff --check >> "$result" 2>&1; then
            echo "PASS git diff --check" >> "$result"
          else
            echo "FAIL git diff --check" >> "$result"
            failed=1
          fi
          if grep -q '@version      0.12.0' pawchive-pw-media-filter.user.js \
             && grep -q "version: '0.12.0'" pawchive-pw-media-filter.user.js \
             && grep -q 'databaseVersion: 6' pawchive-pw-media-filter.user.js \
             && grep -q 'iframely.net' pawchive-pw-media-filter.user.js \
             && grep -q 'v0120-popular-posts' TESTING.md; then
            echo "PASS v0.12.0 release markers" >> "$result"
          else
            echo "FAIL v0.12.0 release markers" >> "$result"
            failed=1
          fi
          cat "$result"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v0120-validation-complete
          path: /tmp/pawchive-v0120-validation.txt
          if-no-files-found: error

      - name: Require successful validation
        shell: bash
        run: test "${{ steps.validate.outputs.failed }}" = "0"

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v0120.yml
          rm -f .github/workflows/apply-v0120-complete.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add v0.12.0 Popular Posts catalogue'
          git push origin HEAD:master
