name: Apply Pawchive v0.13.0

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0130/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0130-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.13.0 patch
        id: apply_patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee /tmp/v0130-apply.log) 2>&1
          set -euxo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "aa7cb992015537f378482c184f9edba99e699873"
          grep -q '@version      0.12.9' pawchive-pw-media-filter.user.js
          cat .pawchive-v0130/part00 .pawchive-v0130/part01 > /tmp/pawchive-v0130.patch.xz.b64
          test "$(sha256sum /tmp/pawchive-v0130.patch.xz.b64 | awk '{print $1}')" = "a380f9de3cc0e9922100e9df8b410e35d58a6cb019a6f2d75427013fc6f055cd"
          base64 -d /tmp/pawchive-v0130.patch.xz.b64 > /tmp/pawchive-v0130.patch.xz
          test "$(sha256sum /tmp/pawchive-v0130.patch.xz | awk '{print $1}')" = "e9bf8ce3e843c85f6f76896b18b0565514e4b1af209dc593f9535096d361d5cd"
          xz -dc /tmp/pawchive-v0130.patch.xz > /tmp/pawchive-v0130.patch
          test "$(sha256sum /tmp/pawchive-v0130.patch | awk '{print $1}')" = "350ce0994d19f35dd680924fb767843128d8aabc2fe859a1c3f59fe34d9ea34a"
          git apply --check --verbose /tmp/pawchive-v0130.patch
          git apply /tmp/pawchive-v0130.patch

      - name: Upload apply diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v0130-apply-log
          path: /tmp/v0130-apply.log
          if-no-files-found: error

      - name: Enforce patch result
        if: steps.apply_patch.outcome != 'success'
        shell: bash
        run: exit 1

      - name: Validate v0.13.0
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 66
          git diff --check
          grep -q '@version      0.13.0' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.0'" pawchive-pw-media-filter.user.js
          grep -q 'nativeTopMirror' pawchive-pw-media-filter.user.js
          grep -q 'nativeBottomMirror' pawchive-pw-media-filter.user.js
          grep -q 'v0.13.0 mirrored Native Popular paginator tests passed' tests/v0130-popular-native-mirrored-paginators.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0130
          rm -f .github/workflows/apply-v0130.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace Popular native pagination with PMF mirrors'
          git push origin HEAD:master
