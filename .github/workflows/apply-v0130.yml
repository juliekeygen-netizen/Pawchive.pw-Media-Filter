name: Apply Pawchive v0.13.0

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0130/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0130-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply v0.13.0 file deltas
        shell: bash
        env:
          PMF_MAIN_PATCH_B64: 
          PMF_OTHER_PATCHES_B64: 
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "aa7cb992015537f378482c184f9edba99e699873"
          grep -q '@version      0.12.9' pawchive-pw-media-filter.user.js

          printf '%s' "$PMF_MAIN_PATCH_B64" | base64 -d > /tmp/pmf-main.zstpatch
          test "$(sha256sum /tmp/pmf-main.zstpatch | awk '{print $1}')" = "5102cb5d02518eeaba1df5672dcbf49703220ace18620119ecb806531f10263e"
          cp pawchive-pw-media-filter.user.js /tmp/pmf-main-base.js
          zstd -d --patch-from=/tmp/pmf-main-base.js /tmp/pmf-main.zstpatch -o /tmp/pmf-main-next.js
          mv /tmp/pmf-main-next.js pawchive-pw-media-filter.user.js

          printf '%s' "$PMF_OTHER_PATCHES_B64" | base64 -d > /tmp/pmf-other.json.zst
          test "$(sha256sum /tmp/pmf-other.json.zst | awk '{print $1}')" = "87760e77a412a32b73f98894e992674a777a1abeecf06cb7ac4a99ba991571d9"
          zstd -d /tmp/pmf-other.json.zst -o /tmp/pmf-other.json
          python3 - <<'PY_PATCH'
          import base64
          import json
          from pathlib import Path
          import subprocess

          records = json.loads(Path('/tmp/pmf-other.json').read_text())
          empty = Path('/tmp/pmf-empty-base')
          empty.write_bytes(b'')
          for index, record in enumerate(records):
              path = Path(record['path'])
              base = path if path.exists() else empty
              patch = Path(f'/tmp/pmf-file-{index:02d}.zstpatch')
              output = Path(f'/tmp/pmf-file-{index:02d}.next')
              patch.write_bytes(base64.b64decode(record['b64']))
              subprocess.run([
                  'zstd', '-d', f'--patch-from={base}', str(patch), '-o', str(output), '-f'
              ], check=True)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(output.read_bytes())
          PY_PATCH

      - name: Validate v0.13.0
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 66
          git diff --check
          grep -q '@version      0.13.0' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.0'" pawchive-pw-media-filter.user.js
          grep -q 'nativeTopMirror' pawchive-pw-media-filter.user.js
          grep -q 'nativeBottomMirror' pawchive-pw-media-filter.user.js
          grep -q 'v0.13.0 mirrored Native Popular paginator tests passed' tests/v0130-popular-native-mirrored-paginators.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0130
          rm -f .github/workflows/apply-v0130.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Replace Popular native pagination with PMF mirrors'
          git push origin HEAD:master
