name: Finalize Pawchive v0.13.9 test suite

on:
  pull_request:
    branches: [master]
    paths: ['.pawchive-v0139-tests-final/trigger']

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Update test versions
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "6a19f3d46c86367d207d378e19e7e9ca48a0da17"
          python - <<'PY'
          from pathlib import Path
          changed = 0
          for path in sorted(Path('tests').glob('*.cjs')):
              text = path.read_text(encoding='utf-8')
              updated = text.replace('0.13.8', '0.13.9').replace(r'0\.13\.8', r'0\.13\.9')
              if updated != text:
                  path.write_text(updated, encoding='utf-8', newline='\n')
                  changed += 1
          print(f'Updated {changed} test files')
          if changed != 50:
              raise SystemExit(f'Expected 50 changed test files, found {changed}')
          PY

      - name: Validate all tests
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          count=0
          while IFS= read -r file; do
            node "$file"
            count=$((count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $count"
          test "$count" -eq 72
          git diff --check
          ! grep -R -n -E '0\.13\.8|0\\\.13\\\.8' tests

      - name: Publish test cleanup
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/fix-v0139-tests.yml
          rm -f .github/workflows/finalize-v0139-tests.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.13.9 regression version expectations'
          git push origin HEAD:master
