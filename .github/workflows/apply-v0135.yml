name: Apply Pawchive v0.13.5

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0135/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0135-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.13.5 patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "a51122fcba6406531d67d6e74dc98a4494b8875e"
          test "$(git hash-object README.md)" = "8eca60ffdfa3dc8dc95d4e2f36f4b237e95c31da"
          test "$(git hash-object CHANGELOG.md)" = "0ee417c816bcba93dcd79cd2968c4a74fd17a6ed"
          cat .pawchive-v0135/part00 .pawchive-v0135/part01 .pawchive-v0135/part02 .pawchive-v0135/part03 .pawchive-v0135/part04 .pawchive-v0135/part05 .pawchive-v0135/part06 > /tmp/pawchive-v0135.patch.xz.b64
          test "$(sha256sum /tmp/pawchive-v0135.patch.xz.b64 | awk '{print $1}')" = "2ac02b5bc19b19b5691f754adf39f7f7f98ccd3d1ffb308812a6d2b306910a23"
          base64 -d /tmp/pawchive-v0135.patch.xz.b64 > /tmp/pawchive-v0135.patch.xz
          test "$(sha256sum /tmp/pawchive-v0135.patch.xz | awk '{print $1}')" = "f3501a6df6677fb323d5cba4fdff8a2762e871deaeff60354545e3521de2a1f3"
          xz -dc /tmp/pawchive-v0135.patch.xz > /tmp/pawchive-v0135.patch
          test "$(sha256sum /tmp/pawchive-v0135.patch | awk '{print $1}')" = "d4e73790104ab1e4b251f2535ccbde73c16a9209bc7d3905ca6aa0caac7e39ec"
          git apply --check /tmp/pawchive-v0135.patch
          git apply /tmp/pawchive-v0135.patch

      - name: Validate v0.13.5
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 70
          git diff --check
          grep -q '@version      0.13.5' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.5'" pawchive-pw-media-filter.user.js
          grep -q 'const PopularDatePicker' pawchive-pw-media-filter.user.js
          grep -q 'Right click for custom date' pawchive-pw-media-filter.user.js
          grep -q 'v0.13.5 Popular period, date, sort, notice, and thumbnail tests passed' tests/v0135-popular-period-date-sort-and-thumbnail.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0135
          rm -f .github/workflows/apply-v0135.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.13.5 Popular period controls and sorting'
          git push origin HEAD:master
