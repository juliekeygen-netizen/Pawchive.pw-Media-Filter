name: Apply Pawchive v0.11.1

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0111/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0111-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply audited patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "772f4f58de3acd01fc1dbb7882dec2284d79d7e1"
          grep -q '@version      0.11.0' pawchive-pw-media-filter.user.js
          cat .pawchive-v0111/part?? > /tmp/pawchive-v0111.patch.gz.b64
          base64 -d /tmp/pawchive-v0111.patch.gz.b64 | gzip -d > /tmp/pawchive-v0111.patch
          test "$(sha256sum /tmp/pawchive-v0111.patch | awk '{print $1}')" = "5291b525f3e202f1e53dd7db38092bf8fbfcf8f1e2c516105a0c0fb910b8836d"
          git apply --check /tmp/pawchive-v0111.patch
          git apply /tmp/pawchive-v0111.patch

      - name: Validate v0.11.1
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 50
          git diff --check
          grep -q '@version      0.11.1' pawchive-pw-media-filter.user.js
          grep -q "version: '0.11.1'" pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0111
          rm -f .github/workflows/apply-v0111.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.11.1 Local catalogue audit findings'
          git push origin HEAD:master
