name: Apply Pawchive v0.12.4

on:
  push:
    branches:
      - master
    paths:
      - '.pawchive-v0124/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0124-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply v0.12.4 patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "ad037ab29c55cd8147b865723148f96141271deb"
          grep -q '@version      0.12.3' pawchive-pw-media-filter.user.js
          git apply --check .pawchive-v0124/v0124.patch
          git apply .pawchive-v0124/v0124.patch

      - name: Validate v0.12.4
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 60
          git diff --check
          grep -q '@version      0.12.4' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.4'" pawchive-pw-media-filter.user.js
          grep -q 'App.pageController=controller' pawchive-pw-media-filter.user.js
          grep -q 'CompactLayoutEngine.connect({signal:PopularPageController.controller?.signal})' pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0124
          rm -f .github/workflows/apply-v0124.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.4 Popular mount controller signal'
          git push origin HEAD:master
