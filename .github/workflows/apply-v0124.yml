name: Apply Pawchive v0.12.5

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0125/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0125-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.12.5 patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "ad037ab29c55cd8147b865723148f96141271deb"
          grep -q '@version      0.12.3' pawchive-pw-media-filter.user.js
          cat .pawchive-v0125/part00 .pawchive-v0125/part01 > /tmp/pawchive-v0125.patch.xz.b64
          test "$(sha256sum /tmp/pawchive-v0125.patch.xz.b64 | awk '{print $1}')" = "c84ab2008abbbb0940129d740e35df27ac129325c4e23e8f038a4e1ab0c04721"
          base64 -d /tmp/pawchive-v0125.patch.xz.b64 > /tmp/pawchive-v0125.patch.xz
          xz -dc /tmp/pawchive-v0125.patch.xz > /tmp/pawchive-v0125.patch
          test "$(sha256sum /tmp/pawchive-v0125.patch | awk '{print $1}')" = "8e60165bd504e15d523cb40ea3607bd127a0d101cc59ac16b7f5cfc8ae1aa164"
          git apply --check /tmp/pawchive-v0125.patch
          git apply /tmp/pawchive-v0125.patch

      - name: Validate v0.12.5
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 60
          git diff --check
          grep -q '@version      0.12.5' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.5'" pawchive-pw-media-filter.user.js
          grep -q "found.grid.insertAdjacentElement('beforebegin',root)" pawchive-pw-media-filter.user.js
          ! grep -q "PopularPageController.bind();UI.updateQuickStatusFilters();CompactLayoutEngine.connect" pawchive-pw-media-filter.user.js
          grep -q 'v0.12.5 Popular mount injection regression tests passed' tests/v0125-popular-mount-injection.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0124 .pawchive-v0125
          rm -f .github/workflows/apply-v0124.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.5 Popular injection and layout lifecycle'
          git push origin HEAD:master
