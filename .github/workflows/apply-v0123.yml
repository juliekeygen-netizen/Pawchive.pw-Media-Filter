name: Apply Pawchive v0.12.3

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0123/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0123-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.12.3 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "b0571e10ac28a289baddb0892d78c747d50d22fc"
          grep -q '@version      0.12.2' pawchive-pw-media-filter.user.js
          : > /tmp/pawchive-v0123.patch.xz.b64
          for part in 00 01 02 03; do
            git show "origin/$GITHUB_HEAD_REF:.pawchive-v0123/part${part}" >> /tmp/pawchive-v0123.patch.xz.b64
          done
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/pawchive-v0123.patch.xz.b64')
          path.write_bytes(path.read_bytes().rstrip(b'\r\n'))
          PY
          test "$(sha256sum /tmp/pawchive-v0123.patch.xz.b64 | awk '{print $1}')" = "e66049b388258a8546f495dc5bc4f273e9b4aadbd8d759708f7502d79595a99e"
          base64 -d /tmp/pawchive-v0123.patch.xz.b64 > /tmp/pawchive-v0123.patch.xz
          test "$(sha256sum /tmp/pawchive-v0123.patch.xz | awk '{print $1}')" = "a08c4b1fd59aa1853293cca3d93e3aa51212f4abb4c80f5ea64003580624165a"
          xz -dc /tmp/pawchive-v0123.patch.xz > /tmp/pawchive-v0123.patch
          test "$(sha256sum /tmp/pawchive-v0123.patch | awk '{print $1}')" = "5b0df85fbd5f87fb89fd3acf5951d496b96a4ce79499e4e8dd8d0f3c106b090e"
          git apply --check /tmp/pawchive-v0123.patch
          git apply /tmp/pawchive-v0123.patch

      - name: Validate v0.12.3
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 59
          git diff --check
          grep -q '@version      0.12.3' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.3'" pawchive-pw-media-filter.user.js
          grep -q 'Popular Posts For The Past 24 Hours' tests/v0123-popular-live-dom-and-runner.cjs
          grep -q '\$maintenanceProcesses = @(Get-MaintenanceProcesses' tools/Start-PawchiveMetadataRunner.ps1
          grep -q -- '--start-minimized' tools/Start-PawchiveMetadataRunner.ps1

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github .pawchive-v0123
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.3 Popular live DOM and metadata runner'
          git push origin HEAD:master
