name: Apply Pawchive v0.11.0

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0110/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0110-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "b9e5b6109c8f18ef18d671bbd2cc2f4635492c42"
          grep -q '@version      0.10.12' pawchive-pw-media-filter.user.js
          cat .pawchive-v0110/part?? > /tmp/pawchive-v0110.patch.gz.b64
          base64 -d /tmp/pawchive-v0110.patch.gz.b64 | gzip -d > /tmp/pawchive-v0110.patch
          test "$(sha256sum /tmp/pawchive-v0110.patch | awk '{print $1}')" = "f057baf7c2cf537721ba9953981b0b0625ac44a0ad20604237a92dfdc28ceb93"
          git apply --check /tmp/pawchive-v0110.patch
          git apply /tmp/pawchive-v0110.patch

      - name: Validate v0.11.0
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 49
          git diff --check
          grep -q '@version      0.11.0' pawchive-pw-media-filter.user.js
          grep -q "version: '0.11.0'" pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0110
          rm -f .github/workflows/apply-v0110.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Redesign v0.11.0 Local catalogue filters and sorting'
          git push origin HEAD:master
