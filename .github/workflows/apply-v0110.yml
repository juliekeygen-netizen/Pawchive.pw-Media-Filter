name: Apply Pawchive v0.10.10

on:
  push:
    branches:
      - master
    paths:
      - '.pawchive-v0110/**'
      - '.github/workflows/apply-v0110.yml'
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0110/pr-trigger'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out current master
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master

      - name: Assemble and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .pawchive-v0110/part?? > /tmp/pawchive-v0110.patch
          actual_size="$(wc -c < /tmp/pawchive-v0110.patch)"
          echo "Patch bytes: $actual_size"
          test "$actual_size" -eq 140046
          sha256sum /tmp/pawchive-v0110.patch
          echo 'b6398ed95c2118e7527825dd0d4e8bc1902ba3228855ccd406da0396f53ba74b  /tmp/pawchive-v0110.patch' | sha256sum -c -

      - name: Apply patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/pawchive-v0110.patch
          git apply /tmp/pawchive-v0110.patch

      - name: Check userscript syntax
        shell: bash
        run: node --check pawchive-pw-media-filter.user.js

      - name: Run all tests
        shell: bash
        run: |
          set -euo pipefail
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 45

      - name: Check diff whitespace
        shell: bash
        run: git diff --check

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0110
          rm -f .github/workflows/apply-v0110.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.10.10 filter consistency, navigation, and maintenance'
          git push origin HEAD:master
