name: Apply Pawchive v0.10.12

on:
  push:
    branches:
      - master
    paths:
      - '.pawchive-v0112/**'
      - '.github/workflows/apply-v0112.yml'

permissions:
  contents: write

concurrency:
  group: pawchive-v0112-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out current master
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          grep -q '@version      0.10.11' pawchive-pw-media-filter.user.js

      - name: Decode and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/pawchive-v01012.patch.gz.b64 <<'PATCH_B64'

PATCH_B64
          base64 -d /tmp/pawchive-v01012.patch.gz.b64 | gzip -d > /tmp/pawchive-v01012.patch
          test "$(sha256sum /tmp/pawchive-v01012.patch | awk '{print $1}')" = "2ceca857beb667803e4b64506cab30db92f9b9385597614a604336fcc41edeaf"
          git apply --check /tmp/pawchive-v01012.patch
          git apply /tmp/pawchive-v01012.patch

      - name: Validate userscript
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 47
          git diff --check

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0112
          rm -f .github/workflows/apply-v0112.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.10.12 creator native-card visibility'
          git push origin HEAD:master
