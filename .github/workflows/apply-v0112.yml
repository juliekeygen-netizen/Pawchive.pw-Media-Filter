name: Apply Pawchive v0.11.2

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0112/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0112-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested mobile patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "25e030f2a6850c93aa55ba88dc6dfb1d317f0887"
          grep -q '@version      0.11.1' pawchive-pw-media-filter.user.js
          base64 -d .pawchive-v0112/patch.b64 | gzip -d > /tmp/pawchive-v0112.patch
          test "$(sha256sum /tmp/pawchive-v0112.patch | awk '{print $1}')" = "b7ae90c3b63a52a61d639c7d303dcfa4970d3dc747fcbef087a957101b9afb78"
          git apply --check /tmp/pawchive-v0112.patch
          git apply /tmp/pawchive-v0112.patch

      - name: Validate v0.11.2
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 51
          git diff --check
          grep -q '@version      0.11.2' pawchive-pw-media-filter.user.js
          grep -q "version: '0.11.2'" pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0112
          rm -f .github/workflows/apply-v0112.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Improve v0.11.2 mobile responsive UI'
          git push origin HEAD:master
