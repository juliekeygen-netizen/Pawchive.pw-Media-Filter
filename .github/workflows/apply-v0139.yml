name: Apply Pawchive v0.13.9

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0139/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0139-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover exact v0.13.9 payload
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "6200d6b16c42c5c21a7209edde979af32bcd874b"
          grep -q '@version      0.13.8' pawchive-pw-media-filter.user.js
          cat .pawchive-v0139/part00 .pawchive-v0139/part01 .pawchive-v0139/part02 .pawchive-v0139/part03 .pawchive-v0139/part04 .pawchive-v0139/part05 .pawchive-v0139/part06 > /tmp/v0139.patch.xz.b64
          test "$(sha256sum /tmp/v0139.patch.xz.b64 | awk '{print $1}')" = "287a79a715bccda98f88605df90a651a71e3f007c9940f3ec6d2039daf87d28f"
          base64 -d /tmp/v0139.patch.xz.b64 > /tmp/v0139.patch.xz
          test "$(sha256sum /tmp/v0139.patch.xz | awk '{print $1}')" = "6489cd17dc2901a48f2325b75407557e926b90f88d4b0929a9a5551a36c601e6"
          xz -dc /tmp/v0139.patch.xz > /tmp/v0139.patch
          test "$(sha256sum /tmp/v0139.patch | awk '{print $1}')" = "41b1c22162be0c98d3abceb3b797d41a0eb0831eae3234990f94ab115c630766"
          git apply --check /tmp/v0139.patch
          git apply /tmp/v0139.patch
          node --check pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0139
          rm -f .github/workflows/apply-v0139.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.13.9 Popular progress and metadata runner visibility'
          git push origin HEAD:master
