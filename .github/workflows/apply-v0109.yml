name: Apply Pawchive v0.10.9

on:
  push:
    branches:
      - master
    paths:
      - '.pawchive-v0109/**'
      - '.github/workflows/apply-v0109.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out master
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate, apply, test, and publish v0.10.9
        shell: bash
        run: |
          set -euo pipefail

          cp .pawchive-v0109/patch.xz.b64 /tmp/pawchive-v0109.patch.xz.b64
          test "$(wc -c < /tmp/pawchive-v0109.patch.xz.b64)" -eq 19064
          echo '54ab8d5d49c6592589caedeea48f3ca5b2362de7fe11b2aaed0cbea630808811  /tmp/pawchive-v0109.patch.xz.b64' | sha256sum -c -

          base64 -d /tmp/pawchive-v0109.patch.xz.b64 > /tmp/pawchive-v0109.patch.xz
          test "$(wc -c < /tmp/pawchive-v0109.patch.xz)" -eq 14296
          echo 'f9a3b768329ffe9af4383f03eb3ecc768ec232ac04948eb5125aeac6b4be3241  /tmp/pawchive-v0109.patch.xz' | sha256sum -c -

          xz -d -c /tmp/pawchive-v0109.patch.xz > /tmp/pawchive-v0109.patch
          test "$(wc -c < /tmp/pawchive-v0109.patch)" -eq 67101
          echo 'a3552a906a7993f295375fc629e58dd979c5dbfca2d33df9bfa3b7aed4a7ddd7  /tmp/pawchive-v0109.patch' | sha256sum -c -

          git apply --check /tmp/pawchive-v0109.patch
          git apply /tmp/pawchive-v0109.patch

          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          test "$test_count" -eq 44
          git diff --check

          rm -rf .pawchive-v0109
          rm -f .github/workflows/apply-v0109.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.10.9 live metadata and creator badge regressions'
          git push origin HEAD:master
