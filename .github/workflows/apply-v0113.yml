name: Apply Pawchive v0.11.3

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0113/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0113-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.11.3 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "5c698cb69521f8cadd3eab37ca9c957b93d151f3"
          grep -q '@version      0.11.2' pawchive-pw-media-filter.user.js
          : > /tmp/pawchive-v0113.patch.gz.b64
          for part in 00 01 02 03 04 05 06; do
            git show "origin/$GITHUB_HEAD_REF:.pawchive-v0113/part${part}" >> /tmp/pawchive-v0113.patch.gz.b64
          done
          base64 -d /tmp/pawchive-v0113.patch.gz.b64 | gzip -d > /tmp/pawchive-v0113.patch
          test "$(sha256sum /tmp/pawchive-v0113.patch | awk '{print $1}')" = "b1a2bdb8f9f10f298ae4d4038f57527508e2888cc948953f7482fb8a13cf63a2"
          git apply --check /tmp/pawchive-v0113.patch
          git apply /tmp/pawchive-v0113.patch

      - name: Validate v0.11.3
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 52
          git diff --check
          grep -q '@version      0.11.3' pawchive-pw-media-filter.user.js
          grep -q "version: '0.11.3'" pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v0113.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add v0.11.3 catalogue portability and mobile fixes'
          git push origin HEAD:master
