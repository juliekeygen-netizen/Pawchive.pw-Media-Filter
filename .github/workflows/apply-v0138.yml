name: Apply Pawchive v0.13.8

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0138/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0138-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.13.8 patch
        shell: bash
        run: |
          set -euo pipefail
          git show origin/publish-v0138c:.pawchive-v0138/patch.xz.b64 > /tmp/v0138.patch.xz.b64
          test "$(sha256sum /tmp/v0138.patch.xz.b64 | awk '{print $1}')" = "d37cb797ec06bc5bd4a64c477a9fb9ad3d8a43f475ace14c3703e9a13227c5cb"
          base64 -d /tmp/v0138.patch.xz.b64 > /tmp/v0138.patch.xz
          xz -dc /tmp/v0138.patch.xz > /tmp/v0138.patch
          test "$(sha256sum /tmp/v0138.patch | awk '{print $1}')" = "f98356abc925f352dae4cda2e55f20e080669aeb46eea3165cf98c4b99f0df86"
          git apply --3way /tmp/v0138.patch

      - name: Validate v0.13.8
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          count=0
          while IFS= read -r test_file; do
            node "$test_file"
            count=$((count+1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          test "$count" -eq 73
          grep -q '@version      0.13.8' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.8'" pawchive-pw-media-filter.user.js
          grep -q 'watch-creators' tools/Start-PawchiveMetadataRunner.ps1

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.13.8 Popular queue and maintenance runner'
          git push origin HEAD:master
