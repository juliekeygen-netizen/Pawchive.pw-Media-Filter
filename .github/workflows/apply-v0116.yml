name: Apply Pawchive v0.11.6

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0116/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0116-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.11.6 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "04ad0aec7a42e3b7344c7fc65e15c35192616ab6"
          grep -q '@version      0.11.5' pawchive-pw-media-filter.user.js
          git show "origin/$GITHUB_HEAD_REF:.pawchive-v0116/patch.b64" | base64 -d | gzip -d > /tmp/pawchive-v0116.patch
          test "$(sha256sum /tmp/pawchive-v0116.patch | awk '{print $1}')" = "68c9a0a45b25df7f094638fdb24f238934eb418c1df0bac008919dbb6b6f33ef"
          git apply --check /tmp/pawchive-v0116.patch
          git apply /tmp/pawchive-v0116.patch

      - name: Validate v0.11.6
        id: validate
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v0116-validation.txt
          : > "$result"
          failed=0
          echo "Node: $(node --version)" >> "$result"
          if node --check pawchive-pw-media-filter.user.js >> "$result" 2>&1; then
            echo "PASS node --check" >> "$result"
          else
            echo "FAIL node --check" >> "$result"
            failed=1
          fi
          test_count=0
          while IFS= read -r test_file; do
            test_count=$((test_count + 1))
            one=/tmp/pawchive-one-test.log
            if node "$test_file" > "$one" 2>&1; then
              echo "PASS $test_file" >> "$result"
            else
              echo "FAIL $test_file" >> "$result"
              cat "$one" >> "$result"
              failed=1
            fi
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count" >> "$result"
          if [ "$test_count" -ne 55 ]; then
            echo "FAIL expected 55 executable tests" >> "$result"
            failed=1
          fi
          if git diff --check >> "$result" 2>&1; then
            echo "PASS git diff --check" >> "$result"
          else
            echo "FAIL git diff --check" >> "$result"
            failed=1
          fi
          if grep -q '@version      0.11.6' pawchive-pw-media-filter.user.js && grep -q "version: '0.11.6'" pawchive-pw-media-filter.user.js; then
            echo "PASS version markers" >> "$result"
          else
            echo "FAIL version markers" >> "$result"
            failed=1
          fi
          cat "$result"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v0116-validation
          path: /tmp/pawchive-v0116-validation.txt
          if-no-files-found: error

      - name: Require successful validation
        shell: bash
        run: test "${{ steps.validate.outputs.failed }}" = "0"

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v0116.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Clean up v0.11.6 import dialog actions'
          git push origin HEAD:master
