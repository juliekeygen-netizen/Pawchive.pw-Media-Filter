name: Trigger Pawchive v0.10.12

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0112/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0112-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover, verify, and apply staged patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          awk '/^H4sI/{capture=1} /^PATCH_B64$/{capture=0} capture{print}' .github/workflows/apply-v0112.yml > /tmp/pawchive-v01012.patch.gz.b64
          base64 -d /tmp/pawchive-v01012.patch.gz.b64 | gzip -d > /tmp/pawchive-v01012.patch
          test "$(sha256sum /tmp/pawchive-v01012.patch | awk '{print $1}')" = "2ceca857beb667803e4b64506cab30db92f9b9385597614a604336fcc41edeaf"
          git apply --check /tmp/pawchive-v01012.patch
          git apply /tmp/pawchive-v01012.patch
          cp .pawchive-v0112/v01012-creator-native-visibility.cjs tests/v01012-creator-native-visibility.cjs

      - name: Validate userscript
        id: validate
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v01012-validation.txt
          : > "$result"
          failed=0
          echo "Node: $(node --version)" >> "$result"
          if node --check pawchive-pw-media-filter.user.js >> "$result" 2>&1; then
            echo "PASS node --check" >> "$result"
          else
            echo "FAIL node --check" >> "$result"
            failed=1
          fi
          test_count=0
          while IFS= read -r test_file; do
            test_count=$((test_count + 1))
            one=/tmp/pawchive-one-test.log
            if node "$test_file" > "$one" 2>&1; then
              echo "PASS $test_file" >> "$result"
            else
              echo "FAIL $test_file" >> "$result"
              cat "$one" >> "$result"
              failed=1
            fi
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count" >> "$result"
          if [ "$test_count" -ne 47 ]; then
            echo "FAIL expected 47 executable tests" >> "$result"
            failed=1
          fi
          if git diff --check >> "$result" 2>&1; then
            echo "PASS git diff --check" >> "$result"
          else
            echo "FAIL git diff --check" >> "$result"
            failed=1
          fi
          cat "$result"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v01012-validation
          path: /tmp/pawchive-v01012-validation.txt
          if-no-files-found: error

      - name: Require successful validation
        shell: bash
        run: test "${{ steps.validate.outputs.failed }}" = "0"

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0112
          rm -f .github/workflows/apply-v0112.yml
          rm -f .github/workflows/pr-apply-v0112.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.10.12 creator native-card visibility'
          git push origin HEAD:master
