name: Trigger Pawchive v0.12.2

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0122/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0122-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.12.2 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "6afee31c44f223b8d7ad77fbe10cc92e17b0f098"
          grep -q '@version      0.12.1' pawchive-pw-media-filter.user.js
          awk '
            /^[[:space:]]*\/Td6WFo/ { capture=1 }
            capture {
              line=$0
              sub(/^[[:space:]]*/, "", line)
              if (line == "PATCH_B64") exit
              print line
            }
          ' .github/workflows/apply-v0122.yml > /tmp/pawchive-v0122.patch.xz.b64
          python - <<'PY'
          from pathlib import Path
          path = Path('/tmp/pawchive-v0122.patch.xz.b64')
          path.write_bytes(path.read_bytes().rstrip(b'\r\n'))
          PY
          test "$(sha256sum /tmp/pawchive-v0122.patch.xz.b64 | awk '{print $1}')" = "291a1a039d23a0a019bee5dca0df76f18929b2575200c852bfc3d0c76db4a9c9"
          base64 -d /tmp/pawchive-v0122.patch.xz.b64 > /tmp/pawchive-v0122.patch.xz
          test "$(sha256sum /tmp/pawchive-v0122.patch.xz | awk '{print $1}')" = "8023de54eccf8c119df0a667ef470d7448021eb1b66ab13e9a2a60b6c2715b56"
          xz -dc /tmp/pawchive-v0122.patch.xz > /tmp/pawchive-v0122.patch
          test "$(sha256sum /tmp/pawchive-v0122.patch | awk '{print $1}')" = "bb72cc4d2a5875071ddbdebaa3a63d99517c2d60e0b5971d3b9286e461b4263b"
          git apply --check /tmp/pawchive-v0122.patch
          git apply /tmp/pawchive-v0122.patch

      - name: Validate v0.12.2
        id: validate
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v0122-validation.txt
          : > "$result"
          failed=0
          echo "Node: $(node --version)" >> "$result"
          if node --check pawchive-pw-media-filter.user.js >> "$result" 2>&1; then
            echo "PASS node --check" >> "$result"
          else
            echo "FAIL node --check" >> "$result"
            failed=1
          fi
          test_count=0
          while IFS= read -r test_file; do
            test_count=$((test_count + 1))
            one=/tmp/pawchive-one-test.log
            if node "$test_file" > "$one" 2>&1; then
              echo "PASS $test_file" >> "$result"
            else
              echo "FAIL $test_file" >> "$result"
              cat "$one" >> "$result"
              failed=1
            fi
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count" >> "$result"
          if [ "$test_count" -ne 58 ]; then
            echo "FAIL expected 58 executable tests" >> "$result"
            failed=1
          fi
          if git diff --check >> "$result" 2>&1; then
            echo "PASS git diff --check" >> "$result"
          else
            echo "FAIL git diff --check" >> "$result"
            failed=1
          fi
          for contract in \
            "@version      0.12.2|pawchive-pw-media-filter.user.js" \
            "version: '0.12.2'|pawchive-pw-media-filter.user.js" \
            "ValidateSet('Auto', 'Chrome', 'Edge', 'Brave')|tools/Start-PawchiveMetadataRunner.ps1" \
            "ToUInt32('80000000', 16)|tools/Start-PawchiveMetadataRunner.ps1" \
            'main,\[role="main"\]|pawchive-pw-media-filter.user.js'; do
            pattern=${contract%%|*}
            file=${contract#*|}
            if grep -q "$pattern" "$file"; then
              echo "PASS contract: $pattern" >> "$result"
            else
              echo "FAIL contract: $pattern in $file" >> "$result"
              failed=1
            fi
          done
          cat "$result"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v0122-validation
          path: /tmp/pawchive-v0122-validation.txt
          if-no-files-found: error

      - name: Require successful validation
        shell: bash
        run: test "${{ steps.validate.outputs.failed }}" = "0"

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github .pawchive-v0122
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.2 Popular bootstrap and Brave runner'
          git push origin HEAD:master
