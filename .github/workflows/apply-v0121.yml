name: Apply Pawchive v0.12.1

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0121/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0121-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.12.1 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "c6a808fd6accffcaa54f243f34b3035999feb5b4"
          grep -q '@version      0.11.6' pawchive-pw-media-filter.user.js
          : > /tmp/pawchive-v0121.patch.gz.b64
          for part in 00 01 02 03; do
            git show "origin/$GITHUB_HEAD_REF:.pawchive-v0121/part${part}" >> /tmp/pawchive-v0121.patch.gz.b64
          done
          test "$(wc -c < /tmp/pawchive-v0121.patch.gz.b64 | tr -d ' ')" = "68748"
          test "$(sha256sum /tmp/pawchive-v0121.patch.gz.b64 | awk '{print $1}')" = "f9edb2b46e0017e2572f95f9cc76f4872e6e1d8cb2d4037bf5d1d4e0e8585351"
          base64 -d /tmp/pawchive-v0121.patch.gz.b64 > /tmp/pawchive-v0121.patch.gz
          test "$(sha256sum /tmp/pawchive-v0121.patch.gz | awk '{print $1}')" = "8d79bf92742e41e93d2dcd9b9803413432ab94c92aa3ffc2721105c3f5ddf266"
          gzip -d -c /tmp/pawchive-v0121.patch.gz > /tmp/pawchive-v0121.patch
          test "$(sha256sum /tmp/pawchive-v0121.patch | awk '{print $1}')" = "f138eea62136529e1a242bac9f59cfda476d1815b9d689d8d6d90f7f7cb2cd85"
          git apply --check /tmp/pawchive-v0121.patch
          git apply /tmp/pawchive-v0121.patch

      - name: Validate v0.12.1
        id: validate
        shell: bash
        run: |
          set +e
          result=/tmp/pawchive-v0121-validation.txt
          : > "$result"
          failed=0
          echo "Node: $(node --version)" >> "$result"
          if node --check pawchive-pw-media-filter.user.js >> "$result" 2>&1; then
            echo "PASS node --check" >> "$result"
          else
            echo "FAIL node --check" >> "$result"
            failed=1
          fi
          test_count=0
          while IFS= read -r test_file; do
            test_count=$((test_count + 1))
            one=/tmp/pawchive-one-test.log
            if node "$test_file" > "$one" 2>&1; then
              echo "PASS $test_file" >> "$result"
            else
              echo "FAIL $test_file" >> "$result"
              cat "$one" >> "$result"
              failed=1
            fi
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count" >> "$result"
          if [ "$test_count" -ne 57 ]; then
            echo "FAIL expected 57 executable tests" >> "$result"
            failed=1
          fi
          if git diff --check >> "$result" 2>&1; then
            echo "PASS git diff --check" >> "$result"
          else
            echo "FAIL git diff --check" >> "$result"
            failed=1
          fi
          if grep -q '@version      0.12.1' pawchive-pw-media-filter.user.js \
             && grep -q "version: '0.12.1'" pawchive-pw-media-filter.user.js \
             && grep -q 'databaseVersion: 6' pawchive-pw-media-filter.user.js \
             && grep -q 'iframely.net' pawchive-pw-media-filter.user.js \
             && test -f tests/v0120-popular-posts.cjs \
             && test -f tests/v0121-popular-live-corrections-and-runner.cjs \
             && test -f tools/Run-PawchiveMetadataMaintenance.ps1 \
             && test -f tools/Run-PawchiveMetadataMaintenance.cmd \
             && test -f tools/METADATA_MAINTENANCE_RUNNER.md; then
            echo "PASS v0.12.1 release markers" >> "$result"
          else
            echo "FAIL v0.12.1 release markers" >> "$result"
            failed=1
          fi
          cat "$result"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload validation diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pawchive-v0121-validation
          path: /tmp/pawchive-v0121-validation.txt
          if-no-files-found: error

      - name: Require successful validation
        shell: bash
        run: test "${{ steps.validate.outputs.failed }}" = "0"

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.1 Popular Posts live regressions and add metadata runner'
          git push origin HEAD:master
