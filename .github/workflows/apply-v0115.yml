name: Apply Pawchive v0.11.5

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0115/pr-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0115-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply tested v0.11.5 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          git checkout -B master origin/master
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "c4eb74eb378cab66c8ef669b98ec0377a6cd3af7"
          grep -q '@version      0.11.4' pawchive-pw-media-filter.user.js
          git show "origin/$GITHUB_HEAD_REF:.pawchive-v0115/patch.b64" | base64 -d | gzip -d > /tmp/pawchive-v0115.patch
          test "$(sha256sum /tmp/pawchive-v0115.patch | awk '{print $1}')" = "60213c721fd946bc45082fda9c0623bfdde905c3f9c9d6d2df2195c70d5d43fa"
          git apply --check /tmp/pawchive-v0115.patch
          git apply /tmp/pawchive-v0115.patch

      - name: Validate v0.11.5
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 54
          git diff --check
          grep -q '@version      0.11.5' pawchive-pw-media-filter.user.js
          grep -q "version: '0.11.5'" pawchive-pw-media-filter.user.js

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-v0115.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.11.5 large catalogue export'
          git push origin HEAD:master
