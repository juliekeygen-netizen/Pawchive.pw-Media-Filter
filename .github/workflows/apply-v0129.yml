name: Apply Pawchive v0.12.9

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0129/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0129-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.12.9 patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "e71a017140ec0549491648352863bff8603b8c52"
          grep -q '@version      0.12.8' pawchive-pw-media-filter.user.js
          test "$(sha256sum .pawchive-v0129/patch.xz.b64 | awk '{print $1}')" = "f46718dc9a8a30ce57508aae7095667f658c2dd80acea82889af6359035257c9"
          base64 -d .pawchive-v0129/patch.xz.b64 > /tmp/pawchive-v0129.patch.xz
          test "$(sha256sum /tmp/pawchive-v0129.patch.xz | awk '{print $1}')" = "b49bf5c9171f5dec32b457ea0822ed54dac6c05c708024f0592823203085f542"
          xz -dc /tmp/pawchive-v0129.patch.xz > /tmp/pawchive-v0129.patch
          test "$(sha256sum /tmp/pawchive-v0129.patch | awk '{print $1}')" = "a8e06fd8b9937c6f6520c6bb9117fecfe4494d8e711958569fe1949510bee09c"
          git apply --check /tmp/pawchive-v0129.patch
          git apply /tmp/pawchive-v0129.patch

      - name: Validate v0.12.9
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 64
          git diff --check
          grep -q '@version      0.12.9' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.9'" pawchive-pw-media-filter.user.js
          grep -q 'Retry scans' pawchive-pw-media-filter.user.js
          grep -q '/static/small_icons/fanbox.png' tests/v0129-popular-performance-retry-and-platform.cjs
          grep -q 'v0.12.9 Popular performance, retry, native-control placement, and platform-icon tests passed' tests/v0129-popular-performance-retry-and-platform.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0129
          rm -f .github/workflows/apply-v0129.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.9 Popular performance and retry behavior'
          git push origin HEAD:master
