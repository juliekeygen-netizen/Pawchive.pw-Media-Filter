name: Apply Pawchive v0.13.2

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0132/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0132-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Apply v0.13.2 lifecycle audit fixes
        shell: bash
        run: |
          set -euo pipefail
          grep -q '@version      0.13.1' pawchive-pw-media-filter.user.js
          test "$(sha256sum .pawchive-v0132/apply.py.xz.b64 | awk '{print $1}')" = "7d2344d0bf52fb727dc38b0ee80fc93dc83743f0e620860ca6ce7de6a1e4d3c4"
          base64 -d .pawchive-v0132/apply.py.xz.b64 > /tmp/apply-v0132.py.xz
          xz -dc /tmp/apply-v0132.py.xz > /tmp/apply-v0132.py
          python /tmp/apply-v0132.py

      - name: Validate v0.13.2
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 67
          git diff --check
          grep -q '@version      0.13.2' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.2'" pawchive-pw-media-filter.user.js
          grep -q 'installHistorySignals' pawchive-pw-media-filter.user.js
          grep -q 'suspendForBfcache' pawchive-pw-media-filter.user.js
          grep -q 'navigation lifecycle audit tests passed' tests/v0132-navigation-lifecycle-audit.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0132
          rm -f .github/workflows/apply-v0132.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Harden v0.13.2 navigation lifecycle'
          git push origin HEAD:master
