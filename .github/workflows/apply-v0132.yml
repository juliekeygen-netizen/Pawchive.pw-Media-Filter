name: Apply Pawchive v0.13.2

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0132/trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0132-publication
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover and apply v0.13.2 patch
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "353e77f47fa746355ee506b73882f57cc3c68ed2"
          grep -q '@version      0.13.1' pawchive-pw-media-filter.user.js
          cat .pawchive-v0132/part00 .pawchive-v0132/part01 .pawchive-v0132/part02 .pawchive-v0132/part03 .pawchive-v0132/part04 .pawchive-v0132/part05 > /tmp/pawchive-v0132.patch.xz.b64
          test "$(sha256sum /tmp/pawchive-v0132.patch.xz.b64 | awk '{print $1}')" = "da9b92a1ce2c98238002b9e7d7ac5893f0d1f71c63d92ed3cfd25c473fc07ec7"
          base64 -d /tmp/pawchive-v0132.patch.xz.b64 > /tmp/pawchive-v0132.patch.xz
          test "$(sha256sum /tmp/pawchive-v0132.patch.xz | awk '{print $1}')" = "c156dc9cdabfaa99da7df830bca2fcedb4fe3d3bbe392fd14232568dd7cf5a04"
          xz -dc /tmp/pawchive-v0132.patch.xz > /tmp/pawchive-v0132.patch
          test "$(sha256sum /tmp/pawchive-v0132.patch | awk '{print $1}')" = "0b58e41328ea97f7a04ee7befc0f4ef6f117c0f2a95e72c085b1540bec0e3df0"
          git apply --check /tmp/pawchive-v0132.patch
          git apply /tmp/pawchive-v0132.patch

      - name: Validate v0.13.2
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 67
          git diff --check
          grep -q '@version      0.13.2' pawchive-pw-media-filter.user.js
          grep -q "version: '0.13.2'" pawchive-pw-media-filter.user.js
          grep -q 'routeMicrotaskPending' pawchive-pw-media-filter.user.js
          grep -q 'routeOffsetEvidence' pawchive-pw-media-filter.user.js
          grep -q 'v0.13.2 navigation lifecycle hardening tests passed' tests/v0132-navigation-lifecycle-hardening.cjs

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .pawchive-v0132
          rm -f .github/workflows/apply-v0132.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Harden v0.13.2 navigation and refresh lifecycle'
          git push origin HEAD:master
