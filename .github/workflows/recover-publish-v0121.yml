name: Recover and publish Pawchive v0.12.1

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0121/recover-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0121-recovery-publication
  cancel-in-progress: false

jobs:
  recover-validate-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover staged v0.12.1 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          python - "$GITHUB_HEAD_REF" <<'PY'
          import base64, gzip, itertools, pathlib, subprocess, sys
          branch = sys.argv[1]
          parts = [
              subprocess.check_output(['git', 'show', f'origin/{branch}:.pawchive-v0121/part{i:02d}'])
              for i in range(4)
          ]
          alphabet = b'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/'
          matches = []
          for placement1, placement2 in itertools.product(('start', 'end'), repeat=2):
              for a, b in itertools.product(alphabet, repeat=2):
                  p1 = (bytes((a,)) + parts[1]) if placement1 == 'start' else (parts[1] + bytes((a,)))
                  p2 = (bytes((b,)) + parts[2]) if placement2 == 'start' else (parts[2] + bytes((b,)))
                  encoded = parts[0] + p1 + p2 + parts[3]
                  try:
                      compressed = base64.b64decode(encoded, validate=True)
                      patch = gzip.decompress(compressed)
                  except Exception:
                      continue
                  if patch.startswith(b'diff --git ') and b'0.12.1' in patch:
                      matches.append((placement1, placement2, a, b, patch))
          unique = {}
          for item in matches:
              unique[item[4]] = item
          matches = list(unique.values())
          if len(matches) != 1:
              raise SystemExit(f'Expected exactly one recoverable patch, found {len(matches)}')
          placement1, placement2, a, b, patch = matches[0]
          pathlib.Path('/tmp/pawchive-v0121.patch').write_bytes(patch)
          print(f'Recovered patch: part01 {placement1}={chr(a)!r}, part02 {placement2}={chr(b)!r}; bytes={len(patch)}')
          PY

      - name: Rebuild audited tree from production v0.11.6
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "c6a808fd6accffcaa54f243f34b3035999feb5b4"
          git read-tree --reset -u 83ea73ad6219d039fa12fdec9eaa90f5a701fb03
          git apply --check /tmp/pawchive-v0121.patch
          git apply /tmp/pawchive-v0121.patch
          python - <<'PY'
          from pathlib import Path
          root = Path('.')
          text_suffixes = {'.md', '.js', '.cjs', '.ps1', '.txt', '.json', '.yml', '.yaml'}
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              if path.name == '.gitignore' or path.suffix.lower() in text_suffixes:
                  data = path.read_bytes()
                  normalized = data.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
                  if normalized != data:
                      path.write_bytes(normalized)
          PY

      - name: Verify exact audited files
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum pawchive-pw-media-filter.user.js | awk '{print $1}')" = "4a4b6451370b6a2823b9b98e831d2deb661b581358145a0c4aeb460e098b2aa8"
          test "$(sha256sum tools/Start-PawchiveMetadataRunner.ps1 | awk '{print $1}')" = "b458c0de8c66d276fda3d9f234c6ec1fc90dbb0229ac495f4aa591b4ed9421b4"
          test "$(sha256sum tools/README.md | awk '{print $1}')" = "b380ea48afb666781f438ff89a97dc718483d10b007cf3886b7fb3e4c4e6cfe1"
          test "$(sha256sum tests/v0121-popular-lifecycle-and-runner.cjs | awk '{print $1}')" = "493af70171c961cd37561edb09eef6be513537a95c2ba1d9ba33d113a2dc2ca4"
          grep -q '@version      0.12.1' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.1'" pawchive-pw-media-filter.user.js
          grep -q "settingsSchema: 6" pawchive-pw-media-filter.user.js
          grep -q "iframely.net" pawchive-pw-media-filter.user.js
          grep -q "pmf_maintenance" pawchive-pw-media-filter.user.js

      - name: Validate v0.12.1
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 57
          git -c core.whitespace=cr-at-eol diff --check

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.1 Popular lifecycle and add metadata runner'
          git push origin HEAD:master
