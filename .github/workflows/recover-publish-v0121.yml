name: Recover and publish Pawchive v0.12.1

on:
  pull_request:
    branches:
      - master
    paths:
      - '.pawchive-v0121-new/release-trigger'

permissions:
  contents: write

concurrency:
  group: pawchive-v0121-release-publication
  cancel-in-progress: false

jobs:
  recover-validate-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out current master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Recover exact audited v0.12.1 patch
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin master "$GITHUB_HEAD_REF"
          : > /tmp/pawchive-v0121.patch.xz.b64
          for i in $(seq -w 0 12); do
            git show "origin/$GITHUB_HEAD_REF:.pawchive-v0121-new/part${i}" >> /tmp/pawchive-v0121.patch.xz.b64
          done
          test "$(sha256sum /tmp/pawchive-v0121.patch.xz.b64 | awk '{print $1}')" = "bffefabd21e0efcdcbdcb3eb324fb7fd80866e281632ec11d547bd7ecb631bfe"
          base64 -d /tmp/pawchive-v0121.patch.xz.b64 > /tmp/pawchive-v0121.patch.xz
          test "$(sha256sum /tmp/pawchive-v0121.patch.xz | awk '{print $1}')" = "dcc2d74d155d44387ebfc64c3942ac880b936d8d3db4a9aef4796098e72c746f"
          xz -dc /tmp/pawchive-v0121.patch.xz > /tmp/pawchive-v0121.patch
          test "$(sha256sum /tmp/pawchive-v0121.patch | awk '{print $1}')" = "5564428b4b9786138c48a9a4106b28cd6f211c7a9d260c27a1babf90258f7325"

      - name: Apply over current production tree
        shell: bash
        run: |
          set -euo pipefail
          test "$(git hash-object pawchive-pw-media-filter.user.js)" = "c6a808fd6accffcaa54f243f34b3035999feb5b4"
          git apply --ignore-space-change --ignore-whitespace --check /tmp/pawchive-v0121.patch
          git apply --ignore-space-change --ignore-whitespace /tmp/pawchive-v0121.patch
          python - <<'PY'
          from pathlib import Path
          suffixes = {'.md', '.js', '.cjs', '.ps1', '.txt', '.json', '.yml', '.yaml'}
          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              if path.name == '.gitignore' or path.suffix.lower() in suffixes:
                  data = path.read_bytes()
                  normalized = data.replace(b'\r\n', b'\n').replace(b'\r', b'\n')
                  if normalized != data:
                      path.write_bytes(normalized)
          PY

      - name: Verify exact audited files
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum pawchive-pw-media-filter.user.js | awk '{print $1}')" = "4a4b6451370b6a2823b9b98e831d2deb661b581358145a0c4aeb460e098b2aa8"
          test "$(sha256sum tools/Start-PawchiveMetadataRunner.ps1 | awk '{print $1}')" = "b458c0de8c66d276fda3d9f234c6ec1fc90dbb0229ac495f4aa591b4ed9421b4"
          test "$(sha256sum tools/README.md | awk '{print $1}')" = "b380ea48afb666781f438ff89a97dc718483d10b007cf3886b7fb3e4c4e6cfe1"
          test "$(sha256sum tests/v0121-popular-lifecycle-and-runner.cjs | awk '{print $1}')" = "493af70171c961cd37561edb09eef6be513537a95c2ba1d9ba33d113a2dc2ca4"
          test "$(sha256sum CHANGELOG.md | awk '{print $1}')" = "ef16f33ed4a05dd72d8ac777858a78ba531962b38cbeb4065fa16ce2aceace04"
          grep -q '@version      0.12.1' pawchive-pw-media-filter.user.js
          grep -q "version: '0.12.1'" pawchive-pw-media-filter.user.js
          grep -q "settingsSchema: 6" pawchive-pw-media-filter.user.js
          grep -q "iframely.net" pawchive-pw-media-filter.user.js
          grep -q "pmf_maintenance" pawchive-pw-media-filter.user.js

      - name: Validate v0.12.1
        shell: bash
        run: |
          set -euo pipefail
          node --check pawchive-pw-media-filter.user.js
          test_count=0
          while IFS= read -r test_file; do
            echo "Running $test_file"
            node "$test_file"
            test_count=$((test_count + 1))
          done < <(find tests -maxdepth 1 -name '*.cjs' ! -name 'test-helper.cjs' | sort)
          echo "Executable tests: $test_count"
          test "$test_count" -eq 57
          git diff --check

      - name: Publish directly to master
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github .pawchive-v0121 .pawchive-v0121-new
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Fix v0.12.1 Popular lifecycle and add metadata runner'
          git push origin HEAD:master
